<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>People in Orbit — 3D preview</title>
<style>
  :root { --panel:#15191e; --ink:#e7eaee; --muted:#8a929c; --line:#262c34; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#060708; color:var(--ink);
    font:13px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  #app { position:fixed; inset:0; }
  #ui { position:fixed; top:14px; left:14px; width:240px; background:rgba(21,25,30,.86);
    border:1px solid var(--line); border-radius:12px; padding:14px; backdrop-filter:blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,.5); }
  h1 { font-size:13px; margin:0 0 2px; } .sub { color:var(--muted); margin:0 0 12px; font-size:11px; }
  .row { display:flex; align-items:center; gap:8px; padding:3px 0; }
  .row label { flex:1; cursor:pointer; user-select:none; }
  .sw { width:11px; height:11px; border-radius:3px; flex:none; }
  .ctl { margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .ctl label { display:block; color:var(--muted); font-size:11px; margin-bottom:4px; }
  input[type=range] { width:100%; accent-color:#ff2bd6; }
  label.chk { display:flex; align-items:center; gap:7px; color:var(--muted); margin-top:8px; cursor:pointer; }
  .btns { display:flex; gap:6px; margin-top:10px; }
  button { flex:1; background:#222831; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:6px; cursor:pointer; font:inherit; } button:hover { border-color:#3a434e; }
  #err { position:fixed; bottom:14px; left:14px; right:14px; color:#ff8a8a;
    font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; }
  a.ideate { position:fixed; top:14px; right:14px; color:var(--ink); background:rgba(21,25,30,.86);
    border:1px solid var(--line); border-radius:8px; padding:8px 12px; text-decoration:none; }
</style>
</head>
<body>
<div id="app"></div>
<a class="ideate" href="ideate.html">✎ ideate</a>
<div id="ui">
  <h1>People in Orbit</h1>
  <p class="sub">snap-groove host · neon · steel</p>
  <div id="parts"></div>
  <div class="ctl">
    <label class="chk"><input type="checkbox" id="anim" checked> animate (orbit + pulse)</label>
    <label style="margin-top:10px">Explode <span id="expv">0</span></label>
    <input id="explode" type="range" min="0" max="600" value="0">
    <label style="margin-top:10px">Glow <span id="glowv">1.8</span></label>
    <input id="glow" type="range" min="0" max="40" value="18">
    <div class="btns">
      <button id="below">From below</button>
      <button id="reset">Reset</button>
    </div>
  </div>
</div>
<div id="err"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { STLLoader } from "three/addons/loaders/STLLoader.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const errEl = document.getElementById("err");
const fail = (m) => { errEl.textContent = m; console.error(m); };

const app = document.getElementById("app");
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x060708);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 200000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
scene.add(new THREE.AmbientLight(0x445577, 0.5));
const key = new THREE.DirectionalLight(0xffffff, 0.9); key.position.set(1,2,1); scene.add(key);
const env = new THREE.HemisphereLight(0x99bbff, 0x080808, 0.5); scene.add(env);

const root = new THREE.Group(); root.rotation.x = -Math.PI/2; scene.add(root); // Z-up -> Y-up

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.8, 0.7, 0.0);
composer.addPass(bloom); composer.addPass(new OutputPass());

const loader = new STLLoader();
const neons = [];   // { mesh, pivot, baseI, phase, baseZ }
const toggles = []; // { meshes:[], name, color }
let home = null;

function material(p) {
  const col = new THREE.Color(p.color);
  if (p.kind === "neon")
    return new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:1.8, roughness:0.4 });
  if (p.kind === "host")
    return new THREE.MeshPhysicalMaterial({ color:0x0d0f13, metalness:0.1, roughness:0.06,
      clearcoat:1, clearcoatRoughness:0.04, reflectivity:0.6 });   // high-gloss dark
  return new THREE.MeshStandardMaterial({ color:col, metalness:0.85, roughness:0.45 }); // steel
}

function addPart(p, geo) {
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, material(p));
  if (p.kind === "neon") {
    const [cx, cy] = p.orbit || [0,0];
    const pivot = new THREE.Group(); pivot.position.set(cx, cy, 0); root.add(pivot);
    mesh.position.set(-cx, -cy, 0); pivot.add(mesh);
    const phase = neons.length * 1.7;
    neons.push({ mesh, pivot, baseI:1.8, phase, baseZ:0 });
    toggles.push({ meshes:[mesh], name:p.name, color:p.color });
  } else {
    root.add(mesh);
    toggles.push({ meshes:[mesh], name:p.name, color:"#"+mesh.material.color.getHexString() });
  }
}

function buildUI() {
  const box = document.getElementById("parts"); box.innerHTML = "";
  for (const t of toggles) {
    const row = document.createElement("div"); row.className = "row";
    const cb = document.createElement("input"); cb.type="checkbox"; cb.checked=true;
    cb.onchange = () => t.meshes.forEach(m => m.visible = cb.checked);
    const sw = document.createElement("span"); sw.className="sw"; sw.style.background=t.color;
    const lb = document.createElement("label"); lb.textContent=t.name;
    lb.onclick = () => { cb.checked=!cb.checked; t.meshes.forEach(m=>m.visible=cb.checked); };
    row.append(cb, sw, lb); box.appendChild(row);
  }
}

function fit() {
  const b = new THREE.Box3().setFromObject(root);
  const c = b.getCenter(new THREE.Vector3()), s = b.getSize(new THREE.Vector3()).length();
  controls.target.copy(c);
  home = { pos:new THREE.Vector3(c.x, c.y - s*0.55, c.z + s*0.7), tgt:c.clone(), s };
  camera.position.copy(home.pos);
  camera.near = s/500; camera.far = s*50; camera.updateProjectionMatrix();
}

fetch("out/manifest.json")
  .then(r => r.ok ? r.json() : Promise.reject("no out/manifest.json — run: uv run python figure.py"))
  .then(async (m) => {
    for (const p of m) { try { addPart(p, await loader.loadAsync("out/"+p.file)); }
                         catch(e){ fail("load out/"+p.file+" — "+e); } }
    buildUI(); fit();
  }).catch(fail);

const $ = id => document.getElementById(id);
let explodeZ = 0;
$("explode").oninput = e => { explodeZ = +e.target.value; $("expv").textContent = explodeZ; };
$("glow").oninput = e => { const v=+e.target.value/10; $("glowv").textContent=v.toFixed(1); bloom.strength=v; };
$("below").onclick = () => { if(home) camera.position.set(home.tgt.x, home.tgt.y - home.s*0.05, home.tgt.z + home.s*0.95); };
$("reset").onclick = () => { if(home){ camera.position.copy(home.pos); controls.target.copy(home.tgt);} };

addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
});

const clock = new THREE.Clock();
(function loop(){
  requestAnimationFrame(loop);
  const t = clock.getElapsedTime(), anim = $("anim").checked;
  for (const n of neons) {
    n.pivot.rotation.z = anim ? 0.06*Math.sin(t*0.4 + n.phase) : 0;
    n.mesh.material.emissiveIntensity = anim ? n.baseI*(0.55+0.5*Math.sin(t*1.6+n.phase)) : n.baseI;
    n.mesh.position.z = -explodeZ;   // drop neon out of the groove
  }
  controls.update(); composer.render();
})();
</script>
</body>
</html>
