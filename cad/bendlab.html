<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bend Lab — LED-flex bend tester</title>
<style>
  :root { --panel:#fff; --ink:#1b2027; --muted:#5b6470; --line:#d6dce3; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#f3f5f8; color:var(--ink);
    font:13px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; overflow:hidden; }
  #c { position:fixed; inset:0; display:block; cursor:crosshair; }
  #ui { position:fixed; top:14px; left:14px; width:250px; background:rgba(255,255,255,.94);
    border:1px solid var(--line); border-radius:12px; padding:14px; box-shadow:0 8px 24px rgba(30,40,60,.12); }
  h1 { font-size:13px; margin:0 0 2px; } .sub { color:var(--muted); margin:0 0 12px; font-size:11px; }
  label.f { display:block; color:var(--muted); font-size:11px; margin:10px 0 3px; }
  input[type=range] { width:100%; accent-color:#1aaf5d; }
  input[type=number] { width:70px; }
  .row { display:flex; gap:6px; margin-top:10px; }
  button { flex:1; background:#eef1f5; color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:7px 6px; cursor:pointer; font:inherit; } button:hover { border-color:#aab4c0; }
  button.on { background:#e3f6ea; border-color:#1aaf5d; }
  .stat { margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:12px; }
  .stat b { font-variant-numeric:tabular-nums; }
  .big { font-size:15px; }
  .ok { color:#138a47; } .bad { color:#c0392b; }
  .hint { color:var(--muted); font-size:11px; margin-top:10px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="holder" style="position:absolute;opacity:0;pointer-events:none;left:-9999px"></div>
<div id="ui">
  <h1>Bend Lab</h1>
  <p class="sub">can the LED flex make this bend?</p>

  <label class="f">Min bend radius: <b id="mrv">150</b> mm</label>
  <input id="minr" type="range" min="40" max="300" value="150">

  <label class="f">View width: <b id="vwv">3.0</b> m</label>
  <input id="vieww" type="range" min="0.5" max="12" step="0.1" value="3">

  <div class="row">
    <button id="m-draw" class="on">Draw</button>
    <button id="m-load">Load SVG…</button>
  </div>
  <input id="file" type="file" accept=".svg" style="display:none">

  <label class="f" id="figrow" style="display:none">Figure width: <b id="fwv">2.5</b> m</label>
  <input id="figw" type="range" min="0.3" max="9" step="0.1" value="2.5" style="display:none">

  <label class="f" style="display:flex;align-items:center;gap:7px;margin-top:12px">
    <input type="checkbox" id="seg"> break at tight bends → separate pieces</label>

  <div class="row"><button id="undo">Undo</button><button id="clear">Clear</button></div>

  <div class="stat">
    tightest bend: <b id="tight" class="big">–</b><br>
    <span id="line2">too tight: <b id="pct">–</b></span> · length: <b id="len">–</b>
  </div>
  <div class="hint">Drag to draw a bend. Red = tighter than the flex can go. The dashed
    ring (bottom-right) is the min radius at this zoom. Load an SVG and scale it to find
    the size where it turns all-green.</div>
</div>
<script>
const cv=document.getElementById("c"), ctx=cv.getContext("2d");
const DPR=Math.min(devicePixelRatio||1,2);
let strokes=[];          // each: {pts:[[mmx,mmy]], loaded:bool}
let drawing=null, mode="draw";
let minR=150, viewW=3000, figW=2500; // mm
let segment=false;
let loadedRaw=null;      // sampled figure in mm (centered), array of point-arrays

function resize(){ cv.width=innerWidth*DPR; cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; draw(); }
addEventListener("resize", resize);

function mmPerPx(){ return viewW / cv.width; }          // device px
const W2S = (mx,my)=>[cv.width/2 + mx/mmPerPx(), cv.height/2 - my/mmPerPx()];
const S2W = (sx,sy)=>[(sx*DPR - cv.width/2)*mmPerPx(), -(sy*DPR - cv.height/2)*mmPerPx()];

function circumR(a,b,c){
  const A=Math.abs((b[0]-a[0])*(c[1]-a[1])-(b[1]-a[1])*(c[0]-a[0]))/2;
  if(A<1e-6) return Infinity;
  const la=Math.hypot(b[0]-c[0],b[1]-c[1]), lb=Math.hypot(a[0]-c[0],a[1]-c[1]), lc=Math.hypot(a[0]-b[0],a[1]-b[1]);
  return (la*lb*lc)/(4*A);
}
function radii(pts){
  const r=[Infinity];
  for(let i=1;i<pts.length-1;i++) r.push(circumR(pts[i-1],pts[i],pts[i+1]));
  r.push(Infinity); return r;
}

function polyline(pts,col,w){
  if(pts.length<2) return;
  ctx.strokeStyle=col; ctx.lineWidth=w*DPR; ctx.beginPath();
  const A=W2S(...pts[0]); ctx.moveTo(A[0],A[1]);
  for(let i=1;i<pts.length;i++){ const P=W2S(...pts[i]); ctx.lineTo(P[0],P[1]); } ctx.stroke();
}
function splitPieces(pts,rs){            // break wherever too tight -> bendable pieces
  const out=[]; let cur=[];
  for(let i=0;i<pts.length;i++){
    if(rs[i]<minR){ if(cur.length>1) out.push(cur); cur=[]; }
    else cur.push(pts[i]);
  }
  if(cur.length>1) out.push(cur);
  return out;
}
function plen(pts){ let L=0; for(let i=0;i<pts.length-1;i++) L+=Math.hypot(pts[i+1][0]-pts[i][0],pts[i+1][1]-pts[i][1]); return L; }

function draw(){
  ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle="#f3f5f8"; ctx.fillRect(0,0,cv.width,cv.height);
  const g=500/mmPerPx(); ctx.strokeStyle="rgba(90,110,140,.10)"; ctx.lineWidth=1*DPR;
  for(let x=cv.width/2%g; x<cv.width; x+=g){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke(); }
  for(let y=cv.height/2%g; y<cv.height; y+=g){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke(); }

  const all=strokes.concat(drawing?[drawing]:[]);
  let minMM=Infinity, bad=0, tot=0, lenMM=0, npieces=0;
  ctx.lineCap="round"; ctx.lineJoin="round";
  for(const s of all){
    if(s.pts.length<2) continue;
    const rs=radii(s.pts);
    for(let i=1;i<rs.length-1;i++){ tot++; if(rs[i]<minR) bad++; if(rs[i]<minMM) minMM=rs[i]; }
    if(segment){
      const pcs=splitPieces(s.pts,rs); npieces+=pcs.length;
      for(const pc of pcs){ polyline(pc,"#1aaf5d",5); lenMM+=plen(pc); }
      for(let i=0;i<s.pts.length;i++) if(rs[i]<minR){           // break markers
        const P=W2S(...s.pts[i]); ctx.fillStyle="#e6194b";
        ctx.beginPath(); ctx.arc(P[0],P[1],3*DPR,0,7); ctx.fill();
      }
    } else {
      for(let i=0;i<s.pts.length-1;i++){
        const tooTight=Math.min(rs[i],rs[i+1])<minR;
        polyline([s.pts[i],s.pts[i+1]], tooTight?"#e6194b":"#1aaf5d", tooTight?7:5);
      }
      lenMM+=plen(s.pts);
    }
  }
  // min-radius reference ring
  const rpx=minR/mmPerPx(), cx=cv.width-rpx-30*DPR, cy=cv.height-rpx-30*DPR;
  ctx.setLineDash([6*DPR,5*DPR]); ctx.strokeStyle="#5b6470"; ctx.lineWidth=1.5*DPR;
  ctx.beginPath(); ctx.arc(cx,cy,rpx,0,7); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle="#5b6470"; ctx.font=`${12*DPR}px ui-sans-serif`; ctx.textAlign="center";
  ctx.fillText(`min ${minR}mm`, cx, cy+4*DPR);

  const t=document.getElementById("tight");
  if(minMM===Infinity){ t.textContent="–"; t.className="big"; }
  else { t.textContent=Math.round(minMM)+" mm"; t.className="big "+(minMM>=minR?"ok":"bad"); }
  document.getElementById("line2").innerHTML = segment
    ? `pieces: <b>${npieces||"–"}</b>` : `too tight: <b>${tot?Math.round(100*bad/tot)+"%":"–"}</b>`;
  document.getElementById("len").textContent = lenMM? (lenMM/1000).toFixed(1)+" m" : "–";
}

// ---- drawing ----
let lastT=0;
cv.addEventListener("pointerdown", e=>{
  if(mode!=="draw") return;
  drawing={pts:[S2W(e.clientX,e.clientY)], loaded:false}; cv.setPointerCapture(e.pointerId);
});
cv.addEventListener("pointermove", e=>{
  if(mode!=="draw"||!drawing) return;
  const now=performance.now(); if(now-lastT<16) return; lastT=now;
  const w=S2W(e.clientX,e.clientY), last=drawing.pts[drawing.pts.length-1];
  if(Math.hypot(last[0]-w[0],last[1]-w[1]) > 6*mmPerPx()*DPR/DPR) { drawing.pts.push(w); draw(); }
});
cv.addEventListener("pointerup", ()=>{ if(drawing&&drawing.pts.length>1) strokes.push(drawing); drawing=null; draw(); });

// ---- load svg ----
function rescaleLoaded(){
  if(!loadedRaw) return;
  strokes = strokes.filter(s=>!s.loaded);
  const s = figW / loadedRaw.bw;
  for(const path of loadedRaw.paths){
    strokes.push({ loaded:true, pts: path.map(([x,y])=>[ (x-loadedRaw.cx)*s, (loadedRaw.cy-y)*s ]) });
  }
  draw();
}
function loadSvgText(txt){
  const holder=document.getElementById("holder"); holder.innerHTML="";
  const doc=new DOMParser().parseFromString(txt,"image/svg+xml");
  const svg=doc.documentElement; holder.appendChild(svg);
  const ps=[...svg.querySelectorAll("path")];
  if(!ps.length){ alert("no <path> in that SVG"); return; }
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9; const paths=[];
  for(const p of ps){
    const L=p.getTotalLength(); const n=Math.max(8,Math.floor(L/1.5)); const pts=[];
    for(let i=0;i<=n;i++){ const q=p.getPointAtLength(i/n*L); pts.push([q.x,q.y]);
      minx=Math.min(minx,q.x);miny=Math.min(miny,q.y);maxx=Math.max(maxx,q.x);maxy=Math.max(maxy,q.y); }
    paths.push(pts);
  }
  loadedRaw={paths, bw:maxx-minx, bh:maxy-miny, cx:(minx+maxx)/2, cy:(miny+maxy)/2};
  document.getElementById("figrow").style.display="block";
  document.getElementById("figw").style.display="block";
  rescaleLoaded();
}

// ---- UI ----
const $=id=>document.getElementById(id);
$("minr").oninput=e=>{ minR=+e.target.value; $("mrv").textContent=minR; draw(); };
$("vieww").oninput=e=>{ viewW=+e.target.value*1000; $("vwv").textContent=(+e.target.value).toFixed(1); draw(); };
$("figw").oninput=e=>{ figW=+e.target.value*1000; $("fwv").textContent=(+e.target.value).toFixed(1); rescaleLoaded(); };
$("seg").onchange=e=>{ segment=e.target.checked; draw(); };
$("m-draw").onclick=()=>{ mode="draw"; $("m-draw").classList.add("on"); $("m-load").classList.remove("on"); };
$("m-load").onclick=()=>{ mode="load"; $("m-load").classList.add("on"); $("m-draw").classList.remove("on"); $("file").click(); };
$("file").onchange=e=>{ const f=e.target.files[0]; if(f) f.text().then(loadSvgText); };
$("undo").onclick=()=>{ for(let i=strokes.length-1;i>=0;i--) if(!strokes[i].loaded){ strokes.splice(i,1); break; } draw(); };
$("clear").onclick=()=>{ strokes=[]; loadedRaw=null; $("figrow").style.display="none"; $("figw").style.display="none"; draw(); };

resize();
</script>
</body>
</html>
